name: Weekly Source Watch

"on":
schedule:
# Runs every Monday at 08:00 UTC.
# Sweden is UTC+1 or UTC+2 depending on season.
- cron: "0 8 * * 1"
workflow_dispatch:

permissions:
contents: write

jobs:
source-watch:
name: Check official source URLs
runs-on: ubuntu-latest

```
steps:
  - name: Check out repository
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.12"

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Run source watcher
    run: python scripts/source_watch.py

  - name: Run source audit
    run: python scripts/source_audit.py

  - name: Commit updated source watch reports
    uses: stefanzweifel/git-auto-commit-action@v5
    with:
      commit_message: Update source watch report
      file_pattern: |
        docs/source_watch_report.md
        docs/source_audit_report.md
        source_snapshots/source_watch_state.json
```
